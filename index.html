<!DOCTYPE html>

    <style>
        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
        }
        body {
            margin: 0;
            padding: 0;
            background: #0f141d;
            color: white;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }
        #game-container {
            position: relative;
            width: 100%;
            max-width: 400px;
        }
        canvas {
            background: #05070a;
            display: block;
            width: 100%;
            border: 4px solid #4a5568;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
        }
        #controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            max-width: 400px;
            margin-top: 10px;
            padding: 5px 15px;
        }
        
        .joystick-container {
            position: relative;
            width: 110px;
            height: 110px;
            background: rgba(45, 55, 72, 0.5);
            border: 3px solid #4a5568;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            touch-action: none;
        }
        .joystick-knob {
            position: absolute;
            width: 45px;
            height: 45px;
            background: #4a5568;
            border: 2px solid #cbd5e1;
            border-radius: 50%;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
            transition: transform 0.05s linear;
        }

        .center-menu {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .btn-shop {
            background: #d97706;
            color: white;
            border: 2px solid #f59e0b;
            font-weight: bold;
            padding: 10px 15px;
            border-radius: 8px;
            cursor: pointer;
            box-shadow: 0 4px #92400e;
        }
        .btn-shop:active {
            transform: translateY(2px);
            box-shadow: 0 2px #92400e;
        }

        /* --- NOVO: Estilos do Botão de Idioma --- */
        .lang-container {
            position: relative;
            display: inline-block;
            width: 100%;
        }
        .btn-lang {
            width: 100%;
            background: #4b5563;
            color: white;
            border: 2px solid #6b7280;
            font-size: 11px;
            font-weight: bold;
            padding: 6px 10px;
            border-radius: 6px;
            cursor: pointer;
        }
        .lang-dropdown {
            display: none;
            position: absolute;
            bottom: 100%;
            left: 0;
            width: 100%;
            background: #1f2937;
            border: 2px solid #4b5563;
            border-radius: 6px;
            box-shadow: 0 -4px 10px rgba(0,0,0,0.5);
            z-index: 10;
        }
        .lang-dropdown button {
            width: 100%;
            background: none;
            border: none;
            color: white;
            padding: 8px;
            text-align: center;
            font-family: monospace;
            cursor: pointer;
        }
        .lang-dropdown button:hover {
            background: #374151;
        }
        /* -------------------------------------- */

        .action-container {
            width: 110px;
        }
        .btn-jump {
            background: #e53e3e;
            color: #fff;
            border: 2px solid #fc8181;
            font-size: 16px;
            font-weight: bold;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            touch-action: manipulation;
            box-shadow: 0 6px #9b2c2c;
            width: 80px;
            height: 80px;
            margin-left: auto;
        }
        .btn-jump:active {
            background: #c53030;
            transform: translateY(4px);
            box-shadow: 0 2px #9b2c2c;
        }

    document.getElementById("btn-jump").innerText = translations[currentLang].btnJump;

    document.getElementById("lang-dropdown").style.display = "none";
}

function updateShopButtonText() {
    const sBtn = document.getElementById("btn-shop");
    if (gameState === "SHOP") {
        sBtn.innerText = translations[currentLang].btnGame;
    } else if (gameState === "MINIGAME") {
        sBtn.innerText = translations[currentLang].btnExitMini;
    } else if (gameState === "BATTLE_CAT") {
        sBtn.innerText = translations[currentLang].btnFlee;
    } else {
        sBtn.innerText = translations[currentLang].btnShop;
    }
}

function initAudio() {
    if (!audioCtx) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        nextNoteTime = audioCtx.currentTime;
    }
    if (audioCtx.state === 'suspended') {
        audioCtx.resume();
    }
}

function playTone(freq, type, duration, vol) {
    if (!audioCtx || freq === 0) return;
    try {
        let osc = audioCtx.createOscillator();
        let gainNode = audioCtx.createGain();
        osc.type = retroMode ? 'square' : type; 
        osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
        gainNode.gain.setValueAtTime(vol, audioCtx.currentTime);
        gainNode.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + duration);
        osc.connect(gainNode);
        gainNode.connect(audioCtx.destination);
        osc.start();
        osc.stop(audioCtx.currentTime + duration);
    } catch(e) {}
}

function playJumpSound() { initAudio(); playTone(160, 'square', 0.12, 0.2); setTimeout(() => playTone(320, 'square', 0.12, 0.2), 40); }
function playFallSound() { initAudio(); playTone(90, 'sawtooth', 0.35, 0.3); }
function playCoinSound() { initAudio(); playTone(600, 'sine', 0.08, 0.15); setTimeout(() => playTone(900, 'sine', 0.18, 0.15), 60); }
function playHammerBreak() { initAudio(); playTone(180, 'triangle', 0.08, 0.3); playTone(380, 'sawtooth', 0.12, 0.2); }
function playAlertSound() { initAudio(); playTone(700, 'sine', 0.04, 0.08); }
function playMagnetSound() { initAudio(); playTone(200, 'sine', 0.4, 0.3); setTimeout(() => playTone(400, 'sine', 0.4, 0.2), 100); }

function scheduler() {
    if (!audioCtx) return;
    while (nextNoteTime < audioCtx.currentTime + 0.1) {
        let currentMelody = gameMelody;
        let currentType = 'triangle';
        let currentVol = 0.12;
        
        if (gameState === "INTRO") { 
            currentMelody = introMelody; 
            currentType = 'sine'; 
        } else if (gameState === "SHOP") { 
            currentMelody = shopMelody; 
            currentType = 'sine'; 
            currentVol = 0.10;
        } else if (gameState === "MINIGAME") { 
            currentMelody = yarnMelody; 
            currentType = (noteIndex % 2 === 0) ? 'triangle' : 'sine'; 
            currentVol = 0.14;
        } else if (gameState === "BATTLE_CAT") {
            currentMelody = battleMelody;
            currentType = 'sawtooth';
            currentVol = 0.12;
        } else if (gameState === "VICTORY") {
            currentMelody = victoryMelody;
            currentType = 'square';
            currentVol = 0.10;
        } else if (gameState === "GAMEOVER") {
            currentMelody = [NOTE_E3, 0, NOTE_E3, 0, NOTE_E3, 0, 0, 0];
            currentType = 'sawtooth';
            currentVol = 0.15;
        } else if (gameState === "PLAYING") {
            if (currentLevel === 4) { 
                currentMelody = chaseMelody; 
                currentType = 'sawtooth'; 
                currentVol = 0.15;
            } else {
                currentMelody = gameMelody;
                currentType = 'triangle';
            }
        }
        
        playTone(currentMelody[noteIndex], currentType, 0.22, currentVol);
        noteIndex = (noteIndex + 1) % currentMelody.length;
        
        let secondsPerBeat = 60.0 / bpm;
        nextNoteTime += 0.4 * secondsPerBeat; 
    }
}

function triggerMagnet() {
    if (minigame.magnetProgress < 100 || minigame.gameOver) return false;
    let activeYarns = minigame.yarns.filter(y => y.alertTicks <= 0);
    if (activeYarns.length > 0) {
        activeYarns.sort((a, b) => {
            let distA = Math.abs(a.x - (player.x + 8)) + Math.abs(a.y - (player.y + 12));
            let distB = Math.abs(b.x - (player.x + 8)) + Math.abs(b.y - (player.y + 12));
            return distA - distB;
        });
        let targets = activeYarns.slice(0, 3);
        for(let target of targets) {
            let index = minigame.yarns.indexOf(target);
            if (index !== -1) { minigame.yarns.splice(index, 1); minigame.score++; }
        }
        playMagnetSound(); minigame.magnetProgress = 0; updateMinigameLayout(); return true;
    }
    return false;
}

const joystick = document.getElementById("joystick");

function activateJoystick(clientX, clientY) {
    initAudio(); 
    if (gameState === "BATTLE_CAT" && catBattle.turn === "PLAYER") {
        joystickActive = true;
        return;
    }
    if (gameState !== "PLAYING" && gameState !== "MINIGAME") return;
    joystickActive = true; const rect = joystick.getBoundingClientRect();
    joystickStartX = rect.left + rect.width / 2; joystickStartY = rect.top + rect.height / 2;
    handleJoystickMove(clientX, clientY);
}

joystick.addEventListener("touchstart", (e) => { e.preventDefault(); activateJoystick(e.touches[0].clientX, e.touches[0].clientY); });
window.addEventListener("touchmove", (e) => { if (joystickActive) handleJoystickMove(e.touches[0].clientX, e.touches[0].clientY); });
window.addEventListener("touchend", () => { deactivateJoystick(); });
joystick.addEventListener("mousedown", (e) => { activateJoystick(e.clientX, e.clientY); });
window.addEventListener("mousemove", (e) => { if (joystickActive) handleJoystickMove(e.clientX, e.clientY); });
window.addEventListener("mouseup", () => { deactivateJoystick(); });

function deactivateJoystick() {
    if (!joystickActive) return; joystickActive = false; knob.style.transform = `translate(0px, 0px)`;
    keys.left = false; keys.right = false; keys.up = false; keys.down = false;
}

function handleJoystickMove(clientX, clientY) {
    if (gameState === "BATTLE_CAT") {
        let deltaY = clientY - joystickStartY;
        if (deltaY < -20) catBattle.selectedOption = 0;
        else if (deltaY > 20) catBattle.selectedOption = 2;
        else if (Math.abs(deltaY) <= 20) catBattle.selectedOption = 1;
        return;
    }
    let deltaX = clientX - joystickStartX; let deltaY = clientY - joystickStartY;
    let distance = Math.sqrt(deltaX * deltaX + deltaY * deltaY); const maxRadius = 35; 
    if (distance > maxRadius) { deltaX = (deltaX / distance) * maxRadius; deltaY = (deltaY / distance) * maxRadius; }
    knob.style.transform = `translate(${deltaX}px, ${deltaY}px)`;
    keys.left = deltaX < -22; keys.right = deltaX > 22; keys.up = deltaY < -22; keys.down = deltaY > 22;
}

function jump() { if (!player.jumping && player.grounded) { player.jumping = true; player.grounded = false; player.vy = -4.7; playJumpSound(); } }

function insideLadder() {
    let currentLadders = gameState === "MINIGAME" ? minigame.ladders : ladders;
    for (let l of currentLadders) { if (player.x + player.width > l.x && player.x < l.x + l.width && player.y + player.height > l.y && player.y < l.y + l.height) return l; }
    return null;
}

function update(now) {
    animationTimer++; scheduler();
    if (gameState === "SHOP" && dialogueTimer > 0) dialogueTimer--;

    if (gameState === "BATTLE_CAT") {
        if (catBattle.turn === "CAT_ATTACKING" || catBattle.turn === "MESSAGE_PAUSE") {
            catBattle.timer--;
            if (catBattle.timer <= 0) {
                if (catBattle.catHp <= 0 || catBattle.spared) {
                    score += catBattle.spared ? 150 : 300;
                    gameState = "SHOP";
                    updateShopButtonText();
                    document.getElementById("lang-container").style.display = "inline-block";
                } else if (catBattle.playerHp <= 0) {
                    gameState = "GAMEOVER";
                    playFallSound();
                    noteIndex = 0;
                } else {
                    let isDefending = catBattle.selectedOption === 1;
                    let catDamage = Math.floor(Math.random() * 8) + 10;
                    if (isDefending) catDamage = Math.floor(catDamage / 3);
                    
                    catBattle.playerHp -= catDamage;
                    catBattle.battleLog = translations[currentLang].logCatAtk + catDamage + translations[currentLang].logCatAtkEnd;
                    playFallSound();
                    catBattle.turn = "PLAYER";
                }
            }
        }
        return;
    }

    if (gameState === "MINIGAME") {
        if (minigame.gameOver) return;
        if (minigame.magnetProgress < 100) { minigame.magnetProgress += (100 / (20 * 60)); if (minigame.magnetProgress > 100) minigame.magnetProgress = 100; }

        let minigameSpeed = 3.5;
        if (!player.jumping) {
            if (keys.left) { player.vx = -minigameSpeed; player.facingLeft = true; } 
            else if (keys.right) { player.vx = minigameSpeed; player.facingLeft = false; } 
            else player.vx = 0;

            let ladder = insideLadder();
            if (ladder) {
                if (keys.up) { player.y -= 2.2; player.vy = 0; player.grounded = true; } 
                else if (keys.down) { player.y += 2.2; player.vy = 0; player.grounded = true; }
            }
            if (!ladder || (!keys.up && !keys.down)) player.vy += 0.25;
        } else { player.vy += 0.25; }
        
        player.x += player.vx; player.y += player.vy;
        if (player.x < 10) player.x = 10; if (player.x + player.width > canvas.width - 10) player.x = canvas.width - 10 - player.width;
        
        player.grounded = false;
        for (let p of minigame.platforms) {
            if (player.x + player.width > p.x && player.x < p.x + p.width && player.y + player.height >= p.y && player.y + player.height - player.vy <= p.y + 6) {
                player.y = p.y - player.height; player.vy = 0; player.jumping = false; player.grounded = true;
            }
        }

        minigame.spawnTimer++;
        if (minigame.spawnTimer > 85) { 
            let spawnX = Math.random() * 340 + 30; minigame.yarns.push({ x: spawnX, y: 135, radius: 8, speedY: 1.5 + Math.random() * 0.8, alertTicks: 35 }); 
            minigame.spawnTimer = 0; playAlertSound();
        }
        
        for (let i = minigame.yarns.length - 1; i >= 0; i--) {
            let y = minigame.yarns[i]; if (y.alertTicks > 0) { y.alertTicks--; continue; }
            y.y += y.speedY;
            let distX = Math.abs(y.x - (player.x + player.width/2)); let distY = Math.abs(y.y - (player.y + player.height/2));
            if (distX < y.radius + player.width/2 && distY < y.radius + player.height/2) { 
                minigame.yarns.splice(i, 1); minigame.score++; updateMinigameLayout(); playCoinSound(); continue; 
            }
            if (y.y > 470) { 
                minigame.yarns.splice(i, 1); minigame.lives--; playFallSound(); if (minigame.lives <= 0) minigame.gameOver = true;
            }
        }
        return;
    }

    if (gameState !== "PLAYING") return;

    let deltaTime = (now - lastTime) / 1000; lastTime = now; timeLeft -= deltaTime;
    if (timeLeft <= 0) { timeLeft = 0; gameState = "GAMEOVER"; playFallSound(); noteIndex = 0;}

    let standingOnLadder = insideLadder() !== null;
    if (player.x + player.width > bigChicken.x && player.x < bigChicken.x + bigChicken.width && player.y + player.height > bigChicken.y && player.y < bigChicken.y + bigChicken.height) {
        playCoinSound(); if (currentLevel < 4) { currentLevel++; loadLevel(currentLevel); } else { victory = true; gameUnlocked = true; gameState = "VICTORY"; noteIndex = 0; } return;
    }

    if (currentLevel === 4) {
        bigFrog.x += 0.8; player.x -= 0.65;    
        if (player.x + player.width > canvas.width) player.x = canvas.width - player.width;
        if (bigFrog.x + bigFrog.width - 15 >= player.x) { gameState = "GAMEOVER"; playFallSound(); noteIndex = 0;} return; 
    }

    if (!player.jumping) {
        if (keys.left) { player.vx = -player.speed; player.facingLeft = true; } else if (keys.right) { player.vx = player.speed; player.facingLeft = false; } else player.vx = 0;
        let ladder = insideLadder();
        if (ladder) { if (keys.up) { player.y -= 2; player.vy = 0; player.grounded = true; } else if (keys.down) { player.y += 2; player.vy = 0; player.grounded = true; } }
        if (!ladder || (!keys.up && !keys.down)) player.vy += 0.25;
    } else { player.vy += 0.25; }

    player.x += player.vx; player.y += player.vy;
    if (player.x < 0) player.x = 0; if (player.x + player.width > canvas.width) player.x = canvas.width - player.width;

    player.grounded = false;
    for (let p of platforms) {
        if (player.x + player.width > p.x && player.x < p.x + p.width && player.y + player.height >= p.y && player.y + player.height - player.vy <= p.y + 6) {
            player.y = p.y - player.height; player.vy = 0; player.vx = 0; player.jumping = false; player.grounded = true;
        }
    }

    bigFrog.throwCooldown++;
    let spawnRate = currentLevel === 3 ? 90 : 130; 
    if (bigFrog.throwCooldown > spawnRate) {
        bigFrog.frame = 1; projectileIdCounter++;
        projectiles.push({ id: projectileIdCounter, x: bigFrog.x + bigFrog.width - 10, y: bigFrog.y + 35, radius: 7, speedX: currentLevel === 2 ? 2.6 : 2.2, currentPlat: 4, scored: false });
        bigFrog.throwCooldown = 0; setTimeout(() => bigFrog.frame = 0, 400);
    }

    bigChicken.frame = (animationTimer % 40 < 20) ? 0 : 1;

    for (let i = projectiles.length - 1; i >= 0; i--) {
        let b = projectiles[i]; b.x += b.speedX;
        if (b.x > canvas.width - 15 && b.currentPlat === 4) { b.speedX = -2.2; b.y = 200; b.currentPlat = 3; }
        else if (b.x < 15 && b.currentPlat === 3) { b.speedX = 2.2; b.y = 290; b.currentPlat = 2; }
        else if (b.x > canvas.width - 15 && b.currentPlat === 2) { b.speedX = -2.2; b.y = 380; b.currentPlat = 1; }
        else if (b.x < 15 && b.currentPlat === 1) { b.speedX = 2.2; b.y = 470; b.currentPlat = 0; }
        if (b.x > canvas.width + 20 || b.x < -20) { projectiles.splice(i, 1); continue; }

        let pCenterX = player.x + player.width / 2; let pCenterY = player.y + player.height / 2;
        let playerFootY = player.y + player.height; let verticalDistance = b.y - playerFootY; let horizontalDistance = Math.abs(pCenterX - b.x);

        if (!b.scored && !standingOnLadder) {
            if (verticalDistance >= 0 && verticalDistance <= 10 && horizontalDistance <= 25) { score += 40; b.scored = true; playCoinSound(); }
        }

        let distX = Math.abs(b.x - pCenterX); let distY = Math.abs(b.y - pCenterY);
        if (distX < b.radius + player.width/2 && distY < b.radius + player.height/2) {
            if (hasHammer) { projectiles.splice(i, 1); hammerUses--; playHammerBreak(); if (hammerUses <= 0) hasHammer = false; } 
            else { gameState = "GAMEOVER"; playFallSound(); noteIndex = 0;}
        }
    }
}

function drawPlayer(x, y) {
    if (hasHammer && gameState !== "MINIGAME") { 
        ctx.strokeStyle = getCol("#fbbf24", 'light'); 
        ctx.lineWidth = 2; 
        ctx.strokeRect(x - 4, y - 4, player.width + 8, player.height + 8); 
    }
    ctx.fillStyle = getCol("#22c55e", 'mid'); ctx.fillRect(x, y + 6, 16, 14); 
    ctx.fillStyle = getCol("#bbf7d0", 'light'); ctx.fillRect(x + 3, y + 12, 10, 8);
    ctx.fillStyle = getCol("#22c55e", 'mid'); ctx.fillRect(x + 1, y, 5, 6); ctx.fillRect(x + 10, y, 5, 6);  
    ctx.fillStyle = getCol("#ffffff", 'light'); ctx.fillRect(x + 2, y + 1, 3, 3); ctx.fillRect(x + 11, y + 1, 3, 3);
    ctx.fillStyle = getCol("#000000", 'dark');
    let eyeLook = player.facingLeft ? 0 : 2;
    ctx.fillRect(x + 2 + eyeLook, y + 1, 1, 2); ctx.fillRect(x + 11 + eyeLook, y + 1, 1, 2);
    ctx.fillStyle = getCol("#16a34a", 'dark'); ctx.fillRect(x - 2, y + 14, 3, 8); ctx.fillRect(x + 15, y + 14, 3, 8);
    ctx.fillRect(x - 2, y + 21, 5, 3); ctx.fillRect(x + 13, y + 21, 5, 3);
}

function drawGatoEnorme(x, y) {
    let offsetAnim = Math.sin(animationTimer * 0.15) * 2;
    ctx.fillStyle = getCol("#4b5563", 'dark'); ctx.fillRect(x - 10, y + 45 + (offsetAnim * 1.5), 14, 10);
    ctx.fillStyle = getCol("#6b7280", 'mid'); ctx.fillRect(x, y + (offsetAnim * 0.5), 80, 70 - (offsetAnim * 0.5)); 
    ctx.fillStyle = getCol("#4b5563", 'dark'); ctx.fillRect(x + 10, y - 20 + (offsetAnim * 0.5), 20, 20); ctx.fillRect(x + 50, y - 20 + (offsetAnim * 0.5), 20, 20); 
    ctx.fillStyle = getCol("#ffffff", 'light'); ctx.fillRect(x + 15, y + 10 + (offsetAnim * 0.5), 10, 10); ctx.fillRect(x + 55, y + 10 + (offsetAnim * 0.5), 10, 10); 
    let eyeOffset = 0;
    if (gameState === "MINIGAME" && minigame.yarns.length > 0) {
        let targetYarn = minigame.yarns[0]; if (targetYarn.x < x + 40) eyeOffset = -2; else if (targetYarn.x > x + 40) eyeOffset = 2; 
    }
    ctx.fillStyle = getCol("#000000", 'dark'); ctx.fillRect(x + 19 + eyeOffset, y + 14 + (offsetAnim * 0.5), 4, 4); ctx.fillRect(x + 59 + eyeOffset, y + 14 + (offsetAnim * 0.5), 4, 4);
    if (gameState === "SHOP" && dialogueTimer > 0 && animationTimer % 14 < 7) {
        ctx.fillStyle = getCol("#7f1d1d", 'dark'); ctx.fillRect(x + 32, y + 25 + (offsetAnim * 0.5), 16, 12); 
    } else { ctx.fillStyle = getCol("#f43f5e", 'light'); ctx.fillRect(x + 36, y + 25 + (offsetAnim * 0.5), 8, 5); }
}

function drawShop() {
    let t = translations[currentLang];
    ctx.fillStyle = getCol("#1e1b4b", 'dark'); ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = getCol("#f59e0b", 'light'); ctx.font = "bold 15px 'Courier New'"; ctx.fillText(t.shopTitle, 110, 25);
    drawGatoEnorme(160, 60); ctx.fillStyle = getCol("#78350f", 'mid'); ctx.fillRect(40, 130, 320, 6);
    ctx.fillStyle = getCol("#ffffff", 'light'); ctx.font = "bold 13px 'Courier New'"; ctx.fillText(t.points + score, 155, 142);

    if (dialogueTimer > 0 && shopDialogue !== "") {
        ctx.fillStyle = getCol("#ffffff", 'light'); ctx.fillRect(30, 80, 120, 45);
        ctx.fillStyle = getCol("#000000", 'dark'); ctx.font = "bold 9px 'Courier New'";
        if(shopDialogue.length > 25) {
            ctx.fillText(shopDialogue.substring(0, 22) + "-", 34, 97); ctx.fillText(shopDialogue.substring(22, 45), 34, 112);
        } else { ctx.fillText(shopDialogue, 34, 105); }
    }

    ctx.strokeStyle = getCol("#4b5563", 'mid'); ctx.lineWidth = 2; ctx.strokeRect(50, 150, 300, 38);
    ctx.fillStyle = getCol("#fbbf24", 'light'); ctx.font = "bold 11px 'Courier New'"; ctx.fillText(t.buyHammer, 60, 173);
    if (hasHammer) { ctx.fillStyle = getCol("#9ca3af", 'light'); ctx.fillText(t.acquired + " (" + hammerUses + ")", 250, 173); }

    ctx.strokeStyle = getCol("#4b5563", 'mid'); ctx.strokeRect(50, 195, 300, 38);
    ctx.fillStyle = getCol("#38bdf8", 'light'); ctx.font = "bold 11px 'Courier New'"; ctx.fillText(t.retroMode + (retroMode ? t.activated : t.deactivated), 60, 218);

    ctx.strokeStyle = getCol("#10b981", 'mid'); ctx.strokeRect(50, 240, 300, 34);
    ctx.fillStyle = getCol("#ffffff", 'light'); ctx.font = "11px 'Courier New'"; ctx.fillText(t.askHammer, 60, 261);

    ctx.strokeStyle = getCol("#10b981", 'mid'); ctx.strokeRect(50, 285, 300, 34);
    ctx.fillStyle = getCol("#ffffff", 'light'); ctx.font = "11px 'Courier New'"; ctx.fillText(t.askWho, 60, 306);

    ctx.strokeStyle = getCol("#ef4444", 'mid'); ctx.strokeRect(50, 330, 300, 34);
    ctx.fillStyle = getCol("#f87171", 'light'); ctx.font = "bold 11px 'Courier New'"; ctx.fillText(t.fight, 60, 351);

    if (gameUnlocked) {
        ctx.strokeStyle = getCol("#8b5cf6", 'mid'); ctx.strokeRect(50, 375, 300, 40); ctx.fillStyle = getCol("#a78bfa", 'light'); ctx.font = "bold 11px 'Courier New'"; ctx.fillText(t.playMinigame, 60, 400);
    } else { ctx.fillStyle = getCol("#9ca3af", 'light'); ctx.font = "10px 'Courier New'"; ctx.fillText(t.lockMinigame, 52, 400); }
}

function drawBattleCat() {
    let t = translations[currentLang];
    ctx.fillStyle = "#0a0a14"; ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = "#ef4444"; ctx.font = "bold 12px 'Courier New'"; ctx.fillText(t.bossName, 40, 35);
    ctx.fillStyle = "#1e1124"; ctx.fillRect(40, 45, 320, 14);
    let catPct = catBattle.catHp / catBattle.catMaxHp;
    ctx.fillStyle = "#ef4444"; ctx.fillRect(42, 47, catPct * 316, 10);

    drawGatoEnorme(160, 80);

    ctx.fillStyle = "#4ade80"; ctx.font = "bold 12px 'Courier New'"; ctx.fillText(t.playerName, 40, 215);
    ctx.fillStyle = "#112417"; ctx.fillRect(40, 225, 200, 12);
    let playPct = catBattle.playerHp / catBattle.playerMaxHp;
    ctx.fillStyle = "#4ade80"; ctx.fillRect(42, 227, playPct * 196, 8);
    ctx.fillText(catBattle.playerHp + " HP", 250, 236);

    ctx.strokeStyle = "#4a5568"; ctx.lineWidth = 2; ctx.strokeRect(20, 260, 360, 70);
    ctx.fillStyle = "#111827"; ctx.fillRect(22, 262, 356, 66);
    ctx.fillStyle = "#fbbf24"; ctx.font = "bold 11px 'Courier New'";
    
    if (catBattle.battleLog.length > 40) {
        ctx.fillText(catBattle.battleLog.substring(0, 40), 30, 288); ctx.fillText(catBattle.battleLog.substring(40), 30, 308);
    } else { ctx.fillText(catBattle.battleLog, 30, 298); }

    if (catBattle.turn === "PLAYER") {
        ctx.fillStyle = "#ffffff"; ctx.font = "bold 12px 'Courier New'"; ctx.fillText(t.chooseCmd, 30, 350);
        const opcoes = [t.whipTongue, t.shield, t.spare];
        for(let i=0; i<opcoes.length; i++) {
            ctx.fillStyle = (catBattle.selectedOption === i) ? "#2563eb" : "#1f2937"; ctx.fillRect(35, 365 + (i * 34), 330, 28);
            ctx.fillStyle = "#ffffff"; ctx.fillText((catBattle.selectedOption === i ? "👉" : "  ") + opcoes[i], 45, 383 + (i * 34));
        }
    } else { ctx.fillStyle = "#f87171"; ctx.font = "bold 12px 'Courier New'"; ctx.fillText(t.waitingTurn, 85, 430); }
}

function draw() {
    let t = translations[currentLang];
    if (gameState === "SHOP") { drawShop(); return; }
    if (gameState === "BATTLE_CAT") { drawBattleCat(); return; }

    if (gameState === "MINIGAME") {
        ctx.fillStyle = getCol("#1e293b", 'dark'); ctx.fillRect(0, 0, canvas.width, canvas.height); drawGatoEnorme(160, 50); 
        ctx.fillStyle = getCol("#475569", 'mid');
        for (let p of minigame.platforms) { ctx.fillRect(p.x, p.y, p.width, p.height); ctx.fillStyle = getCol("#64748b", 'light'); ctx.fillRect(p.x, p.y, p.width, 3); ctx.fillStyle = getCol("#475569", 'mid'); }
        ctx.fillStyle = getCol("#94a3b8", 'light');
        for (let l of minigame.ladders) { for (let j = 0; j < l.height; j += 12) { ctx.fillRect(l.x, l.y + j, l.width, 2); ctx.fillRect(l.x, l.y + j, 2, 12); ctx.fillRect(l.x + l.width - 2, l.y + j, 2, 12); } }
        drawPlayer(player.x, player.y);
        for (let y of minigame.yarns) { 
            if (y.alertTicks > 0) { if (animationTimer % 10 < 6) { ctx.fillStyle = getCol("#ef4444", 'light'); ctx.font = "bold 20px 'Courier New'"; ctx.fillText("⚠️", y.x - 8, 150); } } 
            else { ctx.fillStyle = getCol("#f43f5e", 'light'); ctx.beginPath(); ctx.arc(y.x, y.y, y.radius, 0, Math.PI*2); ctx.fill(); ctx.strokeStyle = getCol("#ffffff", 'mid'); ctx.lineWidth = 1.5; ctx.stroke(); }
        }
        ctx.fillStyle = getCol("#ffffff", 'light'); ctx.font = "bold 14px 'Courier New'"; ctx.fillText(t.yarns + minigame.score, 20, 180); 
        ctx.fillStyle = getCol("#facc15", 'light'); ctx.fillText(t.progWorld + minigame.level, 20, 230);
        let livesHearts = ""; for (let l = 0; l < minigame.lives; l++) livesHearts += "❤️";
        ctx.fillStyle = getCol("#ef4444", 'mid'); ctx.fillText(t.lives + (livesHearts || "💀"), 20, 205);
        ctx.fillStyle = getCol("#9ca3af", 'light'); ctx.font = "bold 11px 'Courier New'"; ctx.fillText(t.magnet, 20, 255); ctx.fillStyle = getCol("#374151", 'dark'); ctx.fillRect(145, 246, 100, 12);
        if (minigame.magnetProgress >= 100) ctx.fillStyle = (animationTimer % 20 < 10) ? getCol("#38bdf8", 'light') : getCol("#0284c7", 'mid'); else ctx.fillStyle = getCol("#0284c7", 'mid');
        ctx.fillRect(147, 248, (minigame.magnetProgress / 100) * 96, 8);
        if (minigame.magnetProgress >= 100) { ctx.fillStyle = getCol("#4ade80", 'light'); ctx.fillText(t.activeJump, 250, 255); } else { ctx.fillStyle = getCol("#9ca3af", 'light'); ctx.fillText(" " + Math.floor(minigame.magnetProgress) + "%", 250, 255); }
        if (minigame.gameOver) {
            ctx.fillStyle = getCol("rgba(0,0,0,0.9)", 'dark'); ctx.fillRect(0, 0, canvas.width, canvas.height); ctx.fillStyle = getCol("#f87171", 'light'); ctx.font = "bold 22px 'Courier New'"; ctx.fillText(t.miniOver, 110, 240);
            ctx.fillStyle = "#fff"; ctx.font = "13px 'Courier New'"; ctx.fillText(t.miniReach + minigame.level, 120, 270); ctx.fillText(t.miniTotal + minigame.score, 120, 295); ctx.fillText(t.clickReset, 80, 340);
        }
        return;
    }

    ctx.fillStyle = getCol("#05070a", 'dark'); ctx.fillRect(0, 0, canvas.width, canvas.height);
    if (gameState === "CLICK_TO_START") { ctx.fillStyle = getCol("#ffffff", 'light'); ctx.font = "bold 14px 'Courier New'"; ctx.fillText(t.clickStart, 65, 240); return; }
    if (gameState === "INTRO") {
        ctx.fillStyle = getCol("#ffffff", 'light'); ctx.font = "bold 18px 'Courier New'"; ctx.fillText(t.introTitle, 85, 50); drawBigFrog(80, 160); drawBigChicken(240, 165); ctx.strokeStyle = getCol("#ef4444", 'mid'); ctx.lineWidth = 3; ctx.strokeRect(60, 100, 270, 150);
        ctx.fillStyle = getCol("#fcd34d", 'light'); ctx.font = "12px 'Courier New'"; ctx.fillText(t.intro1, 45, 300); ctx.fillText(t.intro2, 45, 325); ctx.fillText(t.intro3, 45, 350); ctx.fillText(t.intro4, 45, 375);
        ctx.fillStyle = getCol("#4ade80", 'light'); ctx.fillText(t.introBtn, 75, 440); return;
    }

    ctx.strokeStyle = getCol("#1e293b", 'mid'); ctx.lineWidth = 1; for(let i=0; i<canvas.width; i+=40) { ctx.strokeRect(i, 0, 1, canvas.height); }
    ctx.fillStyle = currentLevel === 4 ? getCol("#b91c1c", 'dark') : getCol("#dc2626", 'mid'); for (let p of platforms) { ctx.fillRect(p.x, p.y, p.width, p.height); ctx.fillStyle = getCol("#ef4444", 'light'); ctx.fillRect(p.x, p.y, p.width, 3); ctx.fillStyle = getCol("#dc2626", 'mid'); }
    ctx.fillStyle = getCol("#60a5fa", 'light'); for (let l of ladders) { for (let j = 0; j < l.height; j += 12) { ctx.fillRect(l.x, l.y + j, l.width, 3); ctx.fillRect(l.x, l.y + j, 3, 12); ctx.fillRect(l.x + l.width - 3, l.y + j, 3, 12); } }
    drawBigFrog(bigFrog.x, bigFrog.y); drawBigChicken(bigChicken.x, bigChicken.y); drawPlayer(player.x, player.y);
    for (let b of projectiles) { ctx.fillStyle = getCol("#b45309", 'light'); ctx.beginPath(); ctx.arc(b.x, b.y, b.radius, 0, Math.PI * 2); ctx.fill(); }

    ctx.fillStyle = getCol("#ffffff", 'light'); ctx.font = "bold 15px 'Courier New'"; ctx.fillText("LVL: " + currentLevel, 15, 30); ctx.fillText("PTS: " + score, 110, 30);
    ctx.fillStyle = timeLeft < 5 ? getCol("#ff4757", 'light') : getCol("#34ece1", 'light'); ctx.fillText("TIME: " + timeLeft.toFixed(1) + "s", 250, 30);
    if (hasHammer) { ctx.fillStyle = getCol("#fbbf24", 'light'); ctx.font = "11px 'Courier New'"; ctx.fillText("🔨 MARTELO ACT: " + hammerUses, 15, 55); }
    
    if (currentLevel === 4 && gameState === "PLAYING") { 
        if (animationTimer % 30 < 15) { ctx.fillStyle = getCol("#facc15", 'light'); ctx.font = "bold 15px 'Courier New'"; ctx.fillText(t.warningChase, 50, 130); }
        ctx.fillStyle = getCol("#ff0000", 'light'); ctx.font = "bold 12px 'Courier New'"; ctx.fillText(t.runFast, 45, 160); 
    }
    
    if (gameState === "GAMEOVER") { ctx.fillStyle = getCol("rgba(0,0,0,0.88)", 'dark'); ctx.fillRect(0, 0, canvas.width, canvas.height); ctx.fillStyle = getCol("#f87171", 'light'); ctx.font = "bold 26px 'Courier New'"; ctx.fillText(t.gameOver, 115, 220); ctx.fillStyle = "#fff"; ctx.font = "14px 'Courier New'"; ctx.fillText(t.restart, 80, 270); }
    if (gameState === "VICTORY") { ctx.fillStyle = getCol("rgba(0,0,0,0.9)", 'dark'); ctx.fillRect(0, 0, canvas.width, canvas.height); ctx.fillStyle = getCol("#4ade80", 'light'); ctx.font = "bold 24px 'Courier New'"; ctx.fillText(t.gameCleared, 110, 200); ctx.fillStyle = getCol("#fbbf24", 'light'); ctx.font = "12px 'Courier New'"; ctx.fillText(t.minigameUnl, 55, 240); ctx.fillStyle = "#fff"; ctx.font = "14px 'Courier New'"; ctx.fillText(t.clickPlayAgain, 90, 280); }
}

function drawBigFrog(x, y) {
    ctx.fillStyle = getCol("#15803d", 'dark'); ctx.fillRect(x - 5, y + 25, 15, 25); ctx.fillRect(x + 60, y + 25, 15, 25); ctx.fillStyle = getCol("#22c55e", 'mid'); ctx.fillRect(x, y, 70, 50);
    ctx.fillStyle = getCol("#166534", 'dark'); ctx.fillRect(x + 10, y + 15, 8, 8); ctx.fillRect(x + 50, y + 20, 10, 6); ctx.fillStyle = getCol("#22c55e", 'mid'); ctx.fillRect(x + 12, y - 8, 16, 10); ctx.fillRect(x + 42, y - 8, 16, 10);
    ctx.fillStyle = getCol("#ffffff", 'light'); ctx.fillRect(x + 14, y - 6, 12, 8); ctx.fillRect(x + 44, y - 6, 12, 8); ctx.fillStyle = getCol("#000000", 'dark'); ctx.fillRect(x + 18, y - 4, 4, 4); ctx.fillRect(x + 48, y - 4, 4, 4);
    if (bigFrog.frame === 0) { ctx.fillStyle = getCol("#14532d", 'dark'); ctx.fillRect(x + 15, y + 32, 40, 4); } else { ctx.fillStyle = getCol("#7f1d1d", 'dark'); ctx.fillRect(x + 15, y + 30, 40, 12); ctx.fillStyle = getCol("#f87171", 'light'); ctx.fillRect(x + 25, y + 36, 20, 6); }
}

function drawBigChicken(x, y) {
    ctx.fillStyle = getCol("#ffffff", 'light'); ctx.fillRect(x, y + 10, 35, 30); ctx.fillRect(x + 10, y, 20, 15); ctx.fillStyle = getCol("#dc2626", 'mid'); ctx.fillRect(x + 15, y - 6, 10, 6);
    ctx.fillStyle = getCol("#b45309", 'dark'); ctx.fillRect(x + 5, y + 35, 6, 10); ctx.fillRect(x + 22, y + 35, 6, 10); ctx.fillStyle = getCol("#000000", 'dark'); ctx.fillRect(x + 24, y + 4, 3, 3); ctx.fillStyle = getCol("#f59e0b", 'light');
    if (bigChicken.frame === 0) { ctx.fillRect(x + 28, y + 6, 10, 4); } else { ctx.fillRect(x + 28, y + 3, 10, 3); ctx.fillRect(x + 28, y + 9, 8, 3); ctx.fillStyle = getCol("#ef4444", 'mid'); ctx.fillRect(x + 29, y + 6, 5, 3); }
}

function resetGame() { score = 0; currentLevel = 1; hasHammer = false; hammerUses = 0; loadLevel(1); gameState = "PLAYING"; noteIndex = 0; }

function gameLoop(now) { update(now); draw(); requestAnimationFrame(gameLoop); }
requestAnimationFrame(gameLoop);
</script>
</body>
</html>
